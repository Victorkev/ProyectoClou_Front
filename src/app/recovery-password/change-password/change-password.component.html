<div>
    <mat-drawer-container>
      <mat-toolbar style="display: flex; justify-content: space-between;">
        <div style="display: flex; align-items: center;">
          <a  href="https://clouhr.cl" target="_blank">
            <img width="80px" src="https://clouhr.cl/wp-content/uploads/2020/07/logo-oscuro-01.png">
          </a>
        </div>
        <div style="display: flex; align-items: center;">
          <span class="example-spacer"></span>
          <a href="https://clouhr.cl/#contact"><button mat-flat-button color="primary" style="width: 120px;font-weight: 600;font-size: 17px;">Contacto</button></a>
        </div>
      </mat-toolbar>
      <div class="content cellphone" role="main" style="text-align: center">
        <div class="container">
          <div *ngIf="!accept">
              <div>
                <a  href="https://clouhr.cl" target="_blank">
                  <img width="80px" src="https://clouhr.cl/wp-content/uploads/2020/07/logo-oscuro-01.png">
                </a>
              </div>
      
              <mat-card-content class="form">
                  <form class="example-form" [formGroup]="angForm">
                      <div>
                          <label>Nueva Contraseña</label>
                      </div>
                      <input class="input-login" matInput type="password" name="password" placeholder="Ingrese tu nueva contraseña" formControlName="password">
                      <br />
                      <div>
                          <label>Confirmar Contraseña</label>
                      </div>
                      <input class="input-login" matInput type="password" name="confirmPassword" placeholder="Confirma la contraseña" formControlName="confirmPassword">
      
                      <button class="login-button" mat-raised-button color="primary" (click)="validaUsuario(errorModal)">
                        <span *ngIf="!loading">Cambiar Contraseña</span>
                        <span class="loading" *ngIf="loading">
                          <mat-spinner style="width: 20px; color: white !important;"></mat-spinner>
                        </span>
                    </button>
                  </form>
              </mat-card-content>
          </div>
          <div *ngIf="accept" class="success-message">
              Tu contraseña ha sido modificada con éxito
              <a routerLink="/login">
                  <button class="login-button" mat-raised-button color="primary">INICIAR SESIÓN</button>
              </a>
          </div>
      </div>
      </div>
      
    <div class="content desktop" role="main" style="text-align: center">
        <div>
            <div class="blockcontent">
                <div *ngIf="!accept">
                    <div>
                        <img src="/assets/img/logo.svg">
                    </div>
                    <form style="margin-top: 29px;padding: 25px;" class="example-form" [formGroup]="angForm">
                        <div style="text-align: left;margin-bottom: 5px;">
                          <label> Nueva Contraseña</label>
                        </div>
                        <input class="input-login" matInput type="password" name="password" placeholder="Ingrese tu nueva contraseña" formControlName="password" style="margin-bottom:15px" />
                        <!--<div style="text-align:left">
                            <mat-error *ngIf="angForm.get('confirmPassword')?.hasError('required')" style="font-size:15px">
                                Debes completar este campo
                            </mat-error>
                        </div> -->
                    <br />
                    <div style="text-align: left;margin-bottom: 5px;">
                      <label>Confirmar Contraseña</label>
                    </div>
                    <input class="input-login" matInput type="password" name="confirmPassword" placeholder="Confirma la contraseña" formControlName="confirmPassword" style="margin-bottom:0px" />
                    <!--<div style="text-align:left">
                        <mat-error *ngIf="angForm.get('confirmPassword')?.hasError('required')" style="font-size:15px">
                            Debes completar este campo
                        </mat-error>
                    </div> -->


                    <button class="login-button" mat-raised-button color="primary" (click)="validaUsuario(errorModal)">
                      <span *ngIf="!loading">Recuperar Contraseña</span>
                      <span class="loading" *ngIf="loading">
                        <mat-spinner style="width: 20px; color: white !important;"></mat-spinner>
                      </span>
                    </button>
                    </form>
                </div>
                <div *ngIf="accept">
                  <a style="color:#133d6a">Tu contraseña ha sido modificada con éxito</a>
                  <br><a style="font-size: 16px;
                  font-family: 'Roboto';font-weight: 700;color:black" routerLink="/login"> <button style="margin-bottom: 35px;
                  width: 250px;
                  height: 42px;
                  margin-top: 25px;
                  background-color: #133d6a!important;
                  color: white!important;" mat-raised-button color="primary" routerLink="/login">
                  Inciar Sesión
                  </button></a>
              </div>
          </div>
        </div>
        
    <div class="slider-container">
      <div class="slide" *ngFor="let image of images">
        <img [src]="image" alt="Slide Image">
      </div>
    </div>
    </div>

        <p style="font-weight: 400;">&nbsp;&nbsp;</p>

    </mat-drawer-container>
  
  </div>


  <ng-template #errorModal>
  <div style="padding:20px 30px 15px 30px;text-align: center;">
    <h3>Error</h3>
    <p>{{errorMsg}}</p>
  </div>
  <mat-divider style="margin-bottom:10px"></mat-divider>
  <div style="text-align: center;">
    <button mat-raised-button [mat-dialog-close] class="custom-button btnHover"
      style="background-color:#3572b8;color:white">Cerrar</button>
  </div>
</ng-template>
