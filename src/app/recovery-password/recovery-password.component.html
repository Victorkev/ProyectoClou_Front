

<div>
    <mat-drawer-container>
      <mat-toolbar style="display: flex; justify-content: space-between;">
        <div style="display: flex; align-items: center;">
         <a  href="https://clouhr.cl" target="_blank">
          <img width="80px" src="https://clouhr.cl/wp-content/uploads/2020/07/logo-oscuro-01.png">
        </a>
        </div>
        <div style="display: flex; align-items: center;">
          <span class="example-spacer"></span>
          <a href="https://clouhr.cl/#contact"><button mat-flat-button color="primary" style="width: 120px;font-weight: 600;font-size: 17px;">Contacto</button></a>
        </div>
      </mat-toolbar>
      <div class="content cellphone" role="main" style="text-align: center">
        <mat-card style="max-width: 340px; width: 100%; margin: auto; margin-top: 60px;background-color:radial-gradient(at bottom right, #17A0AE 75%, #51CFBD 0%)">
            <div *ngIf="!accept">
                <div>
                    <img src="https://clouhr.cl/wp-content/uploads/2020/07/logo-oscuro-01.png"
                         style="max-width: 50%;
                                height: auto;
                                display: block;
                                margin-left: auto;
                                margin-right: auto;">
                </div>
        
              <mat-card-content>
                <form style="margin-top: 29px" class="example-form" [formGroup]="angForm">
                  <div style="text-align: left;">
                    <label style="font-family: 'Ubuntu-Regular';font-size: 16px;color:#133d6a">Correo
                      Electrónico</label>
                  </div>
                  <input class="input-login" matInput type="email" name="email"
                    placeholder="Correo Electrónico" formControlName="username" />
                  <br />
                  <button style="margin-bottom: 35px;
                  width: 100%;
                  height: 42px;
                  margin-top: 25px;
                  background-color: #133d6a!important;
                  color: white!important;" mat-raised-button color="primary" (click)="validaUsuario(errorModal)">
                    <a style="font-size: 16px;
                    font-family: 'Ubuntu-Regular';
                    font-weight: 700;">Iniciar Sesión</a>
                  </button>
                </form>
              </mat-card-content>
            </div>
            <div *ngIf="accept">
                <a style="color:#133d6a">Revisa tu bandeja de correo electrónico, te llegará un link para recuperar tu contraseña</a>
            </div>
        </mat-card>
      </div>
      
    <div class="content desktop" role="main" style="text-align: center">
        <div>
            <div style="padding: 40px 20px 40px 20px;
                box-shadow: 0px 5px 5.5px rgb(0 0 0 / 10%)!important;
                width: 440px;
                border-radius: 16px;
                transform: scale(0.9);
                margin: 20% 0px 0px 0px;background-color: white;">
                <div *ngIf="!accept">
                    <div>
                        <img src="https://clouhr.cl/wp-content/uploads/2020/07/logo-oscuro-01.png"
                            style="max-width: 50%;
                                    height: 'auto';
                                    display: block;
                                    margin-left: auto;
                                    margin-right: auto;">
                    </div>
                    <form style="margin-top: 29px;padding: 25px;" class="example-form" [formGroup]="angForm">
                    <div style="text-align: left;padding-bottom:5px">
                        <label style="font-family: 'Roboto';
                        font-size: 20px;
                        color: #133d6a;
                        font-weight: 500;;">Correo
                        Electrónico</label>
                    </div>
                    
                    <input class="input-login" style="font-size: 18px;" matInput type="email" name="email"
                        placeholder="Ingrese tu correo electrónico" formControlName="username" />
                    <br />
        
                     <button class="login-button" mat-raised-button color="primary" (click)="validaUsuario(errorModal)">
                      <span *ngIf="!loading">Recuperar Contraseña</span>
                      <span class="loading" *ngIf="loading">
                        <mat-spinner style="width: 20px; color: white !important;"></mat-spinner>
                      </span>
                    </button>
                    <button class="login-button" mat-raised-button color="primary" routerLink="/">
                      <span>Cancelar</span>
                    </button>
                    </form>
                </div>
                <div *ngIf="accept">
                    <a style="color:#133d6a;font-size: 18px;">Revisa tu bandeja de correo electrónico, te llegará un link para recuperar tu contraseña</a>
                    <br><a style="font-size: 16px;
                    font-family: 'Roboto';font-weight: 700;color:black" routerLink="/login"> <button style="margin-bottom: 35px;
                    width: 100px;
                    height: 42px;
                    margin-top: 25px;
                    background-color: #133d6a!important;
                    color: white!important;" mat-raised-button color="primary" routerLink="/login">
                    VOLVER
                    </button></a>
                </div>
          </div>
        </div>
        
    <div class="slider-container">
      <div class="slide" *ngFor="let image of images">
        <img [src]="image" alt="Slide Image">
      </div>
    </div>
    </div>

    </mat-drawer-container>
  
  </div>
  
<ng-template #errorModal>
  <div style="padding:25px 30px 15px 30px;text-align: center;">
    <h3>Error</h3>
    <p>{{errorMsg}}</p>
  </div>
  <mat-divider style="margin-bottom:10px"></mat-divider>
  <div style="text-align: center">
    <button mat-raised-button [mat-dialog-close] class="custom-button btnHover"
      style="background-color:#3572b8;color:white">Cerrar</button>
  </div>
</ng-template>
